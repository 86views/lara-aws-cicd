version: "3.9"

services:
  app:
    image: ${IMAGE}
    container_name: laravel-app
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge