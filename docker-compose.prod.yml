# docker-compose.prod.yml
#
# ┌─────────────────────────────────────────────────────┐
# │  Two .env files in play:                            │
# │                                                     │
# │  .env          ← root dir, read by docker compose  │
# │                   contains: APP_IMAGE               │
# │                                                     │
# │  src/.env      ← mounted into the app container    │
# │                   contains: all Laravel APP_* vars  │
# └─────────────────────────────────────────────────────┘

services:

  app:
    image: ${APP_IMAGE}           # set in root .env by deploy.sh
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src/.env:/var/www/html/.env:ro   # mount Laravel .env read-only
    networks:
      - laravel
    command: >
      sh -c "
        mkdir -p storage/framework/{cache/data,sessions,views,testing} storage/logs &&
        chown -R www-data:www-data storage bootstrap/cache &&
        chmod -R 775 storage bootstrap/cache &&
        touch storage/logs/laravel.log &&
        chmod 664 storage/logs/laravel.log &&
        php-fpm
      "

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - laravel
    depends_on:
      - app

# ── Intentionally excluded from prod ──────────────
#
#  db (mysql)   → you are using RDS
#  phpmyadmin   → do not expose in production
#
networks:
  laravel:
    driver: bridge